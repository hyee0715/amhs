spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/amhs
    driver-class-name: org.mariadb.jdbc.Driver
    username: amhs
    password: amhs
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: info
